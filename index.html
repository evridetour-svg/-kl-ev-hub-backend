<!DOCTYPE html>
<html>
<head>
  <title>KL EV HUB EVBIKE</title>
</head>

<body style="font-family:Arial;text-align:center;background:#111;color:white;">

  <h1>🚀 KL EV-BIKE TOUR 🚀</h1>

  <button onclick="book('City Tour',80)">City Tour - RM80</button><br><br>
  <button onclick="book('Night Tour',120)">Night Tour - RM120</button><br><br>
  <button onclick="book('VIP Tour',250)">VIP Tour - RM250</button>

  <script>
    const API_BASE = "https://kl-ev-hub-backend-2.onrender.com";

    async function book(tour, price){
      try {
        const res = await fetch(API_BASE + "/create-order", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ tour, price })
        });

        const data = await res.json();

        alert("Booking Success: " + data.id);

      } catch (err) {
        alert("Error: " + err.message);
      }
    }
  </script>

</body>
</html>
