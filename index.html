<script>
const API_BASE = "https://kl-ev-hub-backend.onrender.com";

async function book(tour, price){
  try {
    const res = await fetch(API_BASE + "/create-order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        tour,
        price
      })
    });

    const data = await res.json();

    alert("Booking Success: " + data.id);

  } catch (err) {
    alert("ERROR: " + err.message);
  }
}
</script>
